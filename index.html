<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸꾸옥 4박 5일 · 10/28–11/1</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d3238;        /* 깊은 바다 */
    --paper:#f2f7f5;      /* 옅은 바닷빛 */
    --line:#cfe0da;
    --d1:#1d7a74;         /* 낮의 바다 */
    --d2:#2e8b57;         /* 정글 (사파리) */
    --d3:#e2932b;         /* 케이블카의 금빛 오후 */
    --d4:#e2603f;         /* 선셋 코럴 */
    --d5:#7a5aa0;         /* 밤 출국 보랏빛 */
    --muted:#5b7570;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{height:100%}
  body{
    min-height:100%;
    font-family:'IBM Plex Sans KR',-apple-system,'Apple SD Gothic Neo',sans-serif;
    background:var(--paper);color:var(--ink);
    display:flex;flex-direction:column;
  }
  header{
    padding:18px 20px 14px;
    background:linear-gradient(180deg,#0d3238 0%,#14504e 100%);
    color:#f2f7f5;
  }
  header .eyebrow{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:#9fd0c5;margin-bottom:6px;
  }
  header h1{
    font-family:'Gowun Batang',serif;font-weight:700;
    font-size:clamp(21px,5.5vw,28px);line-height:1.25;
  }
  header .sub{margin-top:6px;font-size:13px;color:#bfe0d7}
  /* 지도 */
  #map{
    height:44vh;min-height:280px;width:100%;
    border-bottom:1px solid var(--line);
    z-index:0;
  }
  /* 일자 탭 (선셋 리본) */
  nav{
    display:flex;overflow-x:auto;gap:0;
    background:#fff;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:500;
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  nav::-webkit-scrollbar{display:none}
  nav button{
    flex:1 0 auto;min-width:88px;
    padding:11px 14px 9px;border:0;background:none;cursor:pointer;
    font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);
    border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  nav button b{display:block;font-size:14px;color:var(--ink);font-weight:700}
  nav button.on{border-bottom-color:var(--c)}
  nav button.on b{color:var(--c)}
  /* 본문 */
  main{flex:1;max-width:720px;width:100%;margin:0 auto;padding:18px 16px 60px}
  .day{display:none}
  .day.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .day h2{
    font-family:'Gowun Batang',serif;font-size:19px;font-weight:700;
    margin:4px 0 2px;
  }
  .day .theme{font-size:13px;color:var(--muted);margin-bottom:14px}
  .stop{
    display:flex;gap:12px;
    background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;margin-bottom:10px;
    cursor:pointer;transition:box-shadow .15s ease;
  }
  .stop:active{box-shadow:0 2px 10px rgba(13,50,56,.12)}
  .stop .time{
    flex:0 0 auto;width:58px;
    font-size:12px;font-weight:700;color:var(--c);
    padding-top:2px;
  }
  .stop .body{flex:1;min-width:0}
  .stop .name{font-size:15px;font-weight:700;margin-bottom:3px}
  .stop .note{font-size:13px;line-height:1.55;color:var(--muted)}
  .stop .gmap{
    display:inline-block;margin-top:8px;
    font-size:12px;font-weight:700;color:var(--c);text-decoration:none;
    border:1px solid currentColor;border-radius:999px;padding:4px 12px;
  }
  .tips{
    margin-top:22px;background:#fff;border:1px dashed var(--line);
    border-radius:14px;padding:14px 16px;
  }
  .tips h3{font-family:'Gowun Batang',serif;font-size:15px;margin-bottom:8px}
  .tips li{font-size:13px;line-height:1.7;color:var(--muted);margin-left:18px}
  footer{
    text-align:center;font-size:11px;color:var(--muted);
    padding:0 0 26px;
  }
  /* 가로형 화면: 지도 좌측 고정 + 일정 우측 패널 */
  @media (min-width:900px){
    body{
      display:grid;
      grid-template-columns:1fr 440px;
      grid-template-rows:auto auto 1fr auto;
      height:100vh;overflow:hidden;
    }
    header{grid-column:1/-1;grid-row:1}
    #map{
      grid-column:1;grid-row:2/5;
      height:100%;min-height:0;
      border-bottom:0;border-right:1px solid var(--line);
    }
    nav{grid-column:2;grid-row:2;position:static}
    main{
      grid-column:2;grid-row:3;
      overflow-y:auto;min-height:0;
      max-width:none;padding:18px 18px 30px;
    }
    footer{grid-column:2;grid-row:4;padding:10px 12px;border-top:1px solid var(--line)}
  }
  @media (prefers-reduced-motion:reduce){
    .day.on{animation:none}
  }
  /* 편집 모드 */
  #editbar{position:fixed;right:14px;bottom:14px;z-index:900;display:flex;gap:8px}
  #editbar button{
    font-family:inherit;font-size:13px;font-weight:700;
    padding:9px 15px;border-radius:999px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;
    box-shadow:0 3px 12px rgba(13,50,56,.18);
  }
  body.editing #editBtn{background:var(--ink);color:#fff;border-color:var(--ink)}
  .editing .stop{cursor:text}
  .editing .stop .time,.editing .stop .name,.editing .stop .note{
    outline:1.5px dashed var(--c);outline-offset:3px;border-radius:4px;
    min-height:1em;
  }
  .editing .stop .time:focus,.editing .stop .name:focus,.editing .stop .note:focus{
    outline-style:solid;background:#fffdf5;
  }

  .badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;
    background:var(--c);color:#fff;
    font-size:11px;font-weight:800;
    margin-right:7px;vertical-align:-4px;flex:none;
  }
  .tools{display:none;gap:6px;margin-top:9px;flex-wrap:wrap}
  .editing .tools{display:flex}
  .tools button{
    font-family:inherit;font-size:12px;font-weight:700;
    padding:4px 11px;border-radius:8px;border:1px solid var(--line);
    background:#fff;color:var(--ink);cursor:pointer;
  }
  .tools button[data-act="del"]{color:#c0392b;border-color:#e7b3aa}
  .addcard{
    display:none;width:100%;padding:11px;margin:2px 0 12px;
    border:1.5px dashed var(--line);border-radius:12px;background:none;
    font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;
  }
  .editing .addcard{display:block}
  body.placing #map{cursor:crosshair}
  body.placing #map::after{content:''}

  /* leaflet 마커 라벨 */
  .pin{
    display:flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:50% 50% 50% 4px;
    transform:rotate(-45deg);
    color:#fff;font-weight:700;font-size:12px;
    box-shadow:0 2px 6px rgba(13,50,56,.35);
    border:2px solid #fff;
  }
  .pin span{transform:rotate(45deg)}
  .leaflet-popup-content{font-family:'IBM Plex Sans KR',sans-serif;font-size:13px}
  .leaflet-popup-content b{display:block;margin-bottom:2px}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Phú Quốc · Vietnam</div>
  <h1>푸꾸옥 4박 5일</h1>
  <div class="sub">2026.10.28 (수) – 11.1 (일) · 어른 6 + 아기 1</div>
</header>

<div id="map"></div>

<nav id="tabs"></nav>
<main id="days"></main>

<footer>탭에서 날짜 선택 · 카드를 누르면 지도가 이동합니다 · 구글맵 버튼으로 내비 연결</footer>

<div id="editbar">
  <button id="resetBtn" hidden>↺ 초기화</button>
  <button id="commitBtn" hidden>💾 GitHub 저장</button>
  <button id="editBtn">✏️ 편집</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script>
/* ================= 상태 ================= */
if(!window.DEFAULT_DAYS){
  document.body.innerHTML =
    '<div style="max-width:480px;margin:80px auto;padding:24px;font-family:sans-serif;line-height:1.7">'+
    '<h2 style="margin-bottom:10px">⚠️ 일정 데이터(data.js)를 찾을 수 없어요</h2>'+
    '<p>index.html과 <b>data.js가 같은 폴더</b>에 있어야 합니다.</p>'+
    '<p style="color:#666;font-size:14px;margin-top:8px">흔한 원인: zip을 풀지 않고 압축파일 안에서 index.html을 바로 연 경우예요. '+
    '<b>압축을 먼저 풀고</b> 폴더 안의 index.html을 열어주세요.</p></div>';
  throw new Error('data.js not loaded');
}
const DEFAULT_DAYS = window.DEFAULT_DAYS; // 일정 데이터는 data.js에서 로드

function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }
function loadState(){
  return deepCopy(DEFAULT_DAYS); // 항상 data.js 원본 기준 (개인 로컬 저장 없음)
}
let DAYS = loadState();

let dirty = false;
function save(){ dirty = true; } // 실제 저장은 완료 시 GitHub 커밋으로

let editing = false, activeDay = 0, placing = null, dragFrom = null;

/* ================= 지도 ================= */
const map = L.map('map',{scrollWheelZoom:false}).setView([10.19,103.97],10);
map.on('click focus', ()=>map.scrollWheelZoom.enable());
map.on('mouseout blur', ()=>map.scrollWheelZoom.disable());
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:18, attribution:'&copy; OpenStreetMap'
}).addTo(map);

/* ---- 동선 ---- */
const routes = [], arrows = [], rawLegs = [];

function pxToMeters(px){
  const lat = 10.2 * Math.PI/180;
  const mpp = 40075016.686 * Math.cos(lat) / (256 * Math.pow(2, map.getZoom()));
  return px * mpp;
}
function offsetLine(c, d){
  const R = 111320;
  return c.map((p,i)=>{
    const a = c[Math.max(i-1,0)], b = c[Math.min(i+1,c.length-1)];
    const lat = p[0]*Math.PI/180;
    const dx = (b[1]-a[1])*Math.cos(lat), dy = b[0]-a[0];
    const len = Math.hypot(dx,dy) || 1;
    const nx = -dy/len, ny = dx/len;
    return [p[0] + ny*d/R, p[1] + nx*d/(R*Math.cos(lat))];
  });
}
function makeArrows(coords, color){
  const n = coords.length;
  const count = Math.min(Math.max(n>50 ? 5 : n-1, 1), 6);
  const items = [];
  for(let k=0;k<count;k++){
    const f = (k+0.5)/count;
    const i = Math.min(Math.floor(f*(n-1)), n-2);
    const a = coords[i], b = coords[i+1];
    const mid = [(a[0]+b[0])/2,(a[1]+b[1])/2];
    const dy = b[0]-a[0], dx = (b[1]-a[1])*Math.cos(a[0]*Math.PI/180);
    const deg = Math.atan2(dx, dy)*180/Math.PI;
    items.push(L.marker(mid,{interactive:false, icon:L.divIcon({
      className:'', iconSize:[16,16], iconAnchor:[8,8],
      html:`<div style="transform:rotate(${deg}deg);color:${color};font-size:15px;font-weight:900;line-height:16px;text-align:center;text-shadow:0 0 3px #fff,0 0 3px #fff">▲</div>`
    })}));
  }
  return L.layerGroup(items);
}
function drawRoads(di){
  const legs = rawLegs[di];
  if(!legs) return;
  const d = pxToMeters(4);
  if(routes[di]) routes[di].remove();
  routes[di] = L.layerGroup(legs.map(coords=>
    L.polyline(offsetLine(coords, d),
      {color:DAYS[di].color, weight:4, opacity:.85, lineCap:'round'})
  ));
  if(activeDay===di) routes[di].addTo(map);
}
async function loadRoad(di, pts, color){
  try{
    const legs = [];
    for(let i=0;i<pts.length-1;i++){
      const wp = `${pts[i][1]},${pts[i][0]};${pts[i+1][1]},${pts[i+1][0]}`;
      const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${wp}?overview=full&geometries=geojson`);
      if(!res.ok) return;
      const j = await res.json();
      if(!j.routes || !j.routes[0]) return;
      legs.push(j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]));
    }
    if(arrows[di]){ arrows[di].remove(); arrows[di]=null; }
    rawLegs[di] = legs;
    drawRoads(di);
  }catch(e){ /* 실패 시 직선 점선 유지 */ }
}
function refreshDay(di){
  const d = DAYS[di];
  const pts = d.stops.filter(s=>!s.nopin).map(s=>[+s.lat, +s.lng]);
  rawLegs[di] = null;
  if(routes[di]){ routes[di].remove(); routes[di]=null; }
  if(arrows[di]){ arrows[di].remove(); arrows[di]=null; }
  if(pts.length >= 2){
    routes[di] = L.polyline(pts,{color:d.color,weight:3,opacity:.85,dashArray:'6 8',lineCap:'round'});
    arrows[di] = makeArrows(pts, d.color);
    if(activeDay===di){ routes[di].addTo(map); arrows[di].addTo(map); }
    loadRoad(di, pts, d.color);
  }
}
map.on('zoomend', ()=>{ rawLegs.forEach((_,di)=>drawRoads(di)); });
window.addEventListener('resize', ()=>map.invalidateSize());

/* ---- 마커 ---- */
let markers = [];
function popupHtml(di, s){
  return `<b>${s.name||''}</b>${DAYS[di].label} · ${s.t||''}` +
    (s.g ? `<br><a href="${s.g}" target="_blank" rel="noopener">구글맵 열기 ↗</a>` : '');
}
function rebuildMarkers(di){
  markers = markers.filter(x=>{ if(x.di===di){ x.m.remove(); return false; } return true; });
  const d = DAYS[di];
  let order = 0; const seen = {};
  d.stops.forEach((s,si)=>{
    if(s.nopin) return;
    order++;
    const key = (+s.lat).toFixed(5)+','+(+s.lng).toFixed(5);
    const dup = seen[key]||0; seen[key] = dup+1;
    const icon = L.divIcon({
      className:'', iconSize:[28,28], iconAnchor:[14 - dup*32, 26],
      html:`<div class="pin" style="background:${d.color}"><span>${order}</span></div>`
    });
    const m = L.marker([+s.lat,+s.lng],{icon}).bindPopup(popupHtml(di,s));
    m.on('dragend', ()=>{
      const ll = m.getLatLng();
      s.lat = ll.lat; s.lng = ll.lng;
      s.g = 'https://maps.google.com/?q='+ll.lat.toFixed(6)+','+ll.lng.toFixed(6);
      save();
      m.setPopupContent(popupHtml(di,s));
      const link = daysEl.querySelector(`.stop[data-di="${di}"][data-si="${si}"] .gmap`);
      if(link) link.href = s.g;
      refreshDay(di);
    });
    if(di===activeDay){
      m.addTo(map); m.setZIndexOffset(1000);
      if(editing && m.dragging) m.dragging.enable();
    }
    markers.push({di,si,m});
  });
}

/* ---- 렌더 ---- */
const tabs = document.getElementById('tabs');
const daysEl = document.getElementById('days');
const sections = [];

function renderDay(di){
  const d = DAYS[di], sec = sections[di];
  const ce = editing ? ' contenteditable="true"' : '';
  sec.style.setProperty('--c', d.color);
  let order = 0;
  sec.innerHTML = `
    <h2>${d.label} · ${d.title}</h2>
    <div class="theme">${d.theme}</div>
    ${d.stops.map((s,si)=>`
      <div class="stop" style="--c:${d.color}" data-di="${di}" data-si="${si}"${editing?' draggable="true"':''}>
        <div class="time"${ce}>${s.t||''}</div>
        <div class="body">
          <div style="display:flex;align-items:flex-start">${s.nopin ? '' : `<span class="badge">${++order}</span>`}<div class="name"${ce} style="flex:1">${s.name||''}</div></div>
          <div class="note"${ce}>${s.note||''}</div>
          ${(!s.nopin && s.g) ? `<a class="gmap" href="${s.g}" target="_blank" rel="noopener" onclick="event.stopPropagation()">구글맵 ↗</a>` : ''}
          <div class="tools">
            <button type="button" data-act="pin">${s.nopin ? '📍 위치 지정' : '📍 위치 제거'}</button>
            <button type="button" data-act="up">↑</button>
            <button type="button" data-act="down">↓</button>
            <button type="button" data-act="del">🗑 삭제</button>
          </div>
        </div>
      </div>`).join('')}
    <button class="addcard" data-di="${di}">＋ 카드 추가</button>
    ${d.tips && d.tips.length ? `<div class="tips"><h3>메모</h3><ul>${d.tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>` : ''}
  `;
}

function commit(di){ save(); renderDay(di); rebuildMarkers(di); refreshDay(di); }

DAYS.forEach((d,di)=>{
  const btn = document.createElement('button');
  btn.style.setProperty('--c', d.color);
  btn.innerHTML = `<b>Day ${di+1}</b>${d.label}`;
  btn.onclick = ()=>show(di,true);
  tabs.appendChild(btn);
  const sec = document.createElement('section');
  sec.className = 'day';
  daysEl.appendChild(sec);
  sections.push(sec);
  renderDay(di);
  rebuildMarkers(di);
  refreshDay(di);
});

/* ---- 인터랙션 ---- */
daysEl.addEventListener('click', e=>{
  const tool = e.target.closest('.tools button');
  if(tool){
    const card = tool.closest('.stop');
    const di = +card.dataset.di, si = +card.dataset.si;
    const arr = DAYS[di].stops, s = arr[si];
    const act = tool.dataset.act;
    if(act==='del'){
      if(confirm('이 카드를 삭제할까요?')){ arr.splice(si,1); commit(di); }
    } else if(act==='up' && si>0){
      [arr[si-1],arr[si]] = [arr[si],arr[si-1]]; commit(di);
    } else if(act==='down' && si<arr.length-1){
      [arr[si+1],arr[si]] = [arr[si],arr[si+1]]; commit(di);
    } else if(act==='pin'){
      if(s.nopin){
        placing = {di,si};
        document.body.classList.add('placing');
        tool.textContent = '지도를 탭하세요…';
      } else {
        s.nopin = true; commit(di);
      }
    }
    return;
  }
  const addb = e.target.closest('.addcard');
  if(addb){
    const di = +addb.dataset.di;
    DAYS[di].stops.push({t:'', name:'새 일정', note:'', nopin:true});
    commit(di);
    return;
  }
  if(editing) return;
  const card = e.target.closest('.stop');
  if(!card) return;
  const rec = markers.find(x=>x.di==card.dataset.di && x.si==card.dataset.si);
  if(rec){ map.flyTo(rec.m.getLatLng(), 13, {duration:.8}); rec.m.openPopup(); }
});

// 위치 지정: 지도 탭
map.on('click', e=>{
  if(!placing) return;
  const {di,si} = placing;
  placing = null;
  document.body.classList.remove('placing');
  const s = DAYS[di].stops[si];
  s.lat = e.latlng.lat; s.lng = e.latlng.lng;
  delete s.nopin;
  s.g = 'https://maps.google.com/?q='+e.latlng.lat.toFixed(6)+','+e.latlng.lng.toFixed(6);
  commit(di);
});

// 텍스트 수정 저장
daysEl.addEventListener('focusout', e=>{
  if(!editing) return;
  const el = e.target, card = el.closest ? el.closest('.stop') : null;
  if(!card) return;
  const prop = el.classList.contains('time') ? 't'
             : el.classList.contains('name') ? 'name'
             : el.classList.contains('note') ? 'note' : null;
  if(!prop) return;
  const di = +card.dataset.di, si = +card.dataset.si;
  const s = DAYS[di].stops[si];
  s[prop] = el.innerText.trim();
  save();
  const rec = markers.find(x=>x.di===di && x.si===si);
  if(rec) rec.m.setPopupContent(popupHtml(di,s));
});

// 카드 드래그 정렬 (같은 일차 안에서)
daysEl.addEventListener('dragstart', e=>{
  if(!editing) return;
  const c = e.target.closest('.stop');
  if(!c) return;
  dragFrom = {di:+c.dataset.di, si:+c.dataset.si};
  e.dataTransfer.effectAllowed = 'move';
});
daysEl.addEventListener('dragover', e=>{
  if(!dragFrom) return;
  const c = e.target.closest('.stop');
  if(c && +c.dataset.di === dragFrom.di) e.preventDefault();
});
daysEl.addEventListener('drop', e=>{
  if(!dragFrom) return;
  const c = e.target.closest('.stop');
  if(c && +c.dataset.di === dragFrom.di){
    e.preventDefault();
    const di = dragFrom.di, to = +c.dataset.si;
    const arr = DAYS[di].stops;
    const [it] = arr.splice(dragFrom.si, 1);
    arr.splice(to, 0, it);
    commit(di);
  }
  dragFrom = null;
});
daysEl.addEventListener('dragend', ()=>{ dragFrom = null; });

/* ---- 일차 전환 ---- */
function show(di, fly){
  activeDay = di;
  [...tabs.children].forEach((b,i)=>b.classList.toggle('on',i===di));
  sections.forEach((s,i)=>s.classList.toggle('on',i===di));
  routes.forEach((r,i)=>{
    if(!r) return;
    if(i===di){ r.addTo(map); if(arrows[i]) arrows[i].addTo(map); }
    else { r.remove(); if(arrows[i]) arrows[i].remove(); }
  });
  markers.forEach(x=>{
    if(x.di===di){
      x.m.addTo(map); x.m.setZIndexOffset(1000);
      if(editing && x.m.dragging) x.m.dragging.enable();
    } else x.m.remove();
  });
  if(fly){
    const pts = DAYS[di].stops.filter(s=>!s.nopin).map(s=>[+s.lat,+s.lng]);
    if(pts.length) map.flyToBounds(L.latLngBounds(pts).pad(0.35),{duration:.8});
  }
}

/* ---- 편집 모드 ---- */
const editBtn = document.getElementById('editBtn');
const resetBtn = document.getElementById('resetBtn');

function setEditing(on){
  editing = on;
  document.body.classList.toggle('editing', on);
  DAYS.forEach((_,di)=>renderDay(di));
  markers.forEach(x=>{
    if(x.di===activeDay && x.m.dragging){
      on ? x.m.dragging.enable() : x.m.dragging.disable();
    }
  });
  editBtn.textContent = on ? '✓ 완료' : '✏️ 편집';
  resetBtn.hidden = !on;
  document.getElementById('commitBtn').hidden = !(on && window.GITHUB_REPO);
  if(!on && placing){ placing=null; document.body.classList.remove('placing'); }
}
editBtn.onclick = async ()=>{
  if(editing){
    if(dirty && window.GITHUB_REPO){
      if(confirm('변경사항을 GitHub에 저장해서 모두에게 반영할까요?\n(취소하면 변경사항이 사라집니다)')){
        await commitToGitHub();
        if(dirty) return; // 저장 실패 시 편집 모드 유지
      } else {
        // 폐기: 원본으로 복원
        DAYS = deepCopy(DEFAULT_DAYS);
        dirty = false;
        DAYS.forEach((_,di)=>{ renderDay(di); rebuildMarkers(di); refreshDay(di); });
        show(activeDay, false);
      }
    }
    setEditing(false);
  } else {
    setEditing(true);
  }
};

/* ---- GitHub에 data.js 커밋 (원본 갱신 → 모두에게 반영) ---- */
const commitBtn = document.getElementById('commitBtn');

function buildDataJs(){
  return '/* 이 파일은 웹 편집기에서 자동 생성됨 */\n'
    + 'window.GITHUB_REPO = ' + JSON.stringify(window.GITHUB_REPO||null) + ';\n'
    + 'window.GH_TOKEN_ENC = ' + JSON.stringify(window.GH_TOKEN_ENC||null) + ';\n'
    + 'window.DEFAULT_DAYS = ' + JSON.stringify(DAYS, null, 2) + ';\n';
}
/* 공용 비밀번호로 암호화된 토큰 복호화 (PBKDF2 + AES-GCM) */
const b64d = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function decryptToken(enc, pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64d(enc.s), iterations:200000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64d(enc.i)}, key, b64d(enc.d));
  return new TextDecoder().decode(buf);
}
let ghTokenCache = null;
try{ ghTokenCache = sessionStorage.getItem('gh_tk'); }catch(e){}
async function getToken(force){
  if(ghTokenCache && !force) return ghTokenCache;
  if(window.GH_TOKEN_ENC){
    for(;;){
      const pw = prompt('편집 비밀번호를 입력하세요');
      if(pw === null) return null;
      try{
        ghTokenCache = await decryptToken(window.GH_TOKEN_ENC, pw.trim());
        try{ sessionStorage.setItem('gh_tk', ghTokenCache); }catch(e){}
        return ghTokenCache;
      }catch(e){ alert('비밀번호가 틀렸습니다.'); }
    }
  }
  // (비번 설정이 없으면) 개인 토큰 직접 입력 방식
  let t = null;
  try{ t = localStorage.getItem('gh_token'); }catch(e){}
  if(!t || force){
    t = prompt('GitHub 토큰(fine-grained, Contents 쓰기 권한)을 입력하세요.\n이 기기에만 저장됩니다.');
    if(t){ t = t.trim(); try{ localStorage.setItem('gh_token', t); }catch(e){} }
  }
  ghTokenCache = t;
  return t;
}
async function commitToGitHub(){
  const cfg = window.GITHUB_REPO;
  if(!cfg){ alert('data.js에 window.GITHUB_REPO 설정이 필요합니다.'); return; }
  let token = await getToken(false);
  if(!token) return;
  commitBtn.disabled = true; commitBtn.textContent = '저장 중…';
  try{
    const api = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path||'data.js'}`;
    const headers = {
      'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github+json',
      'Content-Type':'application/json'
    };
    // 현재 파일 sha 조회
    let res = await fetch(`${api}?ref=${cfg.branch||'main'}`, {headers});
    if(res.status===401 || res.status===403){
      token = await getToken(true);
      if(!token) throw new Error('토큰 없음');
      headers['Authorization'] = 'Bearer '+token;
      res = await fetch(`${api}?ref=${cfg.branch||'main'}`, {headers});
    }
    if(!res.ok) throw new Error('파일 조회 실패 ('+res.status+')');
    const cur = await res.json();
    // 커밋
    const content = btoa(unescape(encodeURIComponent(buildDataJs())));
    const put = await fetch(api, {
      method:'PUT', headers,
      body: JSON.stringify({
        message:'일정 수정 ('+new Date().toLocaleString('ko-KR')+')',
        content, sha: cur.sha, branch: cfg.branch||'main'
      })
    });
    if(!put.ok) throw new Error('커밋 실패 ('+put.status+')');
    dirty = false;
    alert('커밋 완료! 1~2분 후 재배포되면 모두에게 반영됩니다.');
  }catch(e){
    alert('저장 실패: '+e.message+'\n토큰 권한(Contents: Read and write)과 repo 설정을 확인하세요.');
  }finally{
    commitBtn.disabled = false; commitBtn.textContent = '💾 GitHub 저장';
  }
}
commitBtn.onclick = commitToGitHub;
resetBtn.onclick = ()=>{
  if(confirm('편집 중인 변경사항을 버리고 원본으로 되돌릴까요?')){
    location.reload();
  }
};

show(0,false);
</script>
